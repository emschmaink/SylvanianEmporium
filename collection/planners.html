<!doctype html>

<head>
<meta charset="utf-8">

<title>Sylvanian Emporium</title>

<!-- ✅ FIXED CSS PATH -->
<link rel="stylesheet" href="/style.css">
<script src="/cart.js" defer></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Libre+Baskerville&display=swap" rel="stylesheet">

<body>

<div class="page">
    
<!-- HEADER -->
<header class="top-header">

  <div class="header-left">
    <button id="account-btn" class="account-button">
     <img src="/assets/account.png" alt="Account">
    </button>
  </div>

  <div class="logo">
    <img src="/assets/logo.png" alt="Sylvanian Emporium">
  </div>

  <div class="header-right">
    <button id="cart-btn" class="cart-button">
     <img src="/assets/cart.png" alt="Cart">
    </button>
  </div>

</header>
    
<!-- Cart Dropdown -->
<div id="cart-panel" class="hidden">
  <h3>Your Cart</h3>

  <div id="cart-items">
    <p class="empty">Your cart is empty</p>
  </div>

  <div class="cart-footer">
    <span id="cart-total">$0.00</span>
    <button id="checkout-btn">Checkout</button>
  </div>
</div>

<script>
    const cartBtn = document.getElementById("cart-btn");
    const cartPanel = document.getElementById("cart-panel");

    cartBtn.addEventListener("click", () => {
      cartPanel.classList.toggle("hidden");
    });
  </script>
