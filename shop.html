<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop — Sylvanian Emporium</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <img class="full-header" src="./assets/header.png" alt="Sylvanian Emporium">
    <nav class="main-nav">
      <a href="./index.html">Home</a>
      <a href="./shop.html" aria-current="page">Shop</a>
      <a href="./about.html">About</a>
      <a href="./faq.html">FAQ</a>
      <a href="./contact.html">Contact</a>
    </nav>
  </header>

    <main id="main">
    <section class="announcement container">
      <div class="pill-image">
        <img src="./assets/announcement.png" alt="Your order could make an impact!">
        <a href="#" class="learn-link">LEARN MORE</a>
      </div>
    </section>

  <main class="shop-wrap>
    <section class="catalog-search">
  <label class="sr-only" for="q">Search products</label>
  <input id="q" class="search-input" type="search" placeholder="Search notebooks, bookmarks, keychains…" autocomplete="off">
  
  <div class="filters">
    <button class="chip is-active" data-type="all">All</button>
    <button class="chip" data-type="notebooks">Notebooks</button>
    <button class="chip" data-type="bookmarks">Bookmarks</button>
    <button class="chip" data-type="keychains">Keychains</button>
  </div>

  <div id="results" class="results" aria-live="polite"></div>
</section>

<script>
  // --- tiny helper: safely load JSON ---
  async function loadCatalog() {
    const res = await fetch('./assets/products.json', {cache: 'no-store'});
    if (!res.ok) throw new Error('Could not load products.json');
    return res.json();
  }

  // --- normalize text for matching ---
  const norm = s => (s || '').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g, '');

  // --- debounce ---
  const debounce = (fn, ms=120) => {
    let t; return (...a) => { clearTimeout(t); t = setTimeout(()=>fn(...a), ms); };
  };

  // --- render one card ---
  function cardHTML(p, query) {
    const q = norm(query);
    const title = p.title.replace(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'i'), '<mark>$1</mark>');
    return `
      <a class="card" href="${p.url}">
        <div class="card-body">
          <h3>${q ? title : p.title}</h3>
          <p class="meta">${p.type} · $${Number(p.price).toFixed(2)}</p>
          ${p.tags?.length ? `<p class="tags">${p.tags.slice(0,4).map(t=>`<span>${t}</span>`).join('')}</p>` : ''}
        </div>
      </a>
    `;
  }

  (async function initSearch(){
    const data = await loadCatalog();
    const input = document.getElementById('q');
    const results = document.getElementById('results');
    const chips = [...document.querySelectorAll('.filters .chip')];
    let currentType = 'all';

    function runSearch() {
      const q = norm(input.value.trim());
      let items = data;

      if (currentType !== 'all') {
        items = items.filter(p => p.type === currentType);
      }
      if (q) {
        items = items.filter(p => {
          const hay = [p.title, p.type, ...(p.tags||[])].map(norm).join(' ');
          return hay.includes(q);
        });
      }

      results.innerHTML = items.length
        ? items.map(p => cardHTML(p, input.value.trim())).join('')
        : `<p class="empty">No matches yet. Try a different term or category.</p>`;
    }

    const doSearch = debounce(runSearch, 120);
    input.addEventListener('input', doSearch);

    chips.forEach(chip=>{
      chip.addEventListener('click', ()=>{
        chips.forEach(c=>c.classList.remove('is-active'));
        chip.classList.add('is-active');
        currentType = chip.dataset.type;
        runSearch();
      });
    });

    // initial render
    runSearch();
  })();
</script>

</main>
     
<footer class="site-footer">
  <div class="container">
    <small>© <span id="year"></span> Sylvanian Emporium</small>
    <div class="social-links">
      <a href="https://www.etsy.com/shop/SYLVANIANEMPORIUM" target="_blank" rel="noopener">
        <img src="./assets/etsy.png" alt="Etsy">
      </a>
      <a href="https://instagram.com/SYLVANIAN.EMPORIUM" target="_blank" rel="noopener">
        <img src="./assets/instagram.png" alt="Instagram">
      </a>
      <a href="https://discord.gg/tVnAVeVzAV" target="_blank" rel="noopener">
        <img src="./assets/discord.png" alt="Discord">
      </a>
    </div>
  </div>
</footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
